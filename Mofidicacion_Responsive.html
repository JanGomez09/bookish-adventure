<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Día del Libro 2026 – Modificar Función</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --rojo: #7a1c1c;
      --rojo-hover: #9a2a2a;
      --crema: #f5f0e8;
      --crema-input: #ffffff;
      --texto-dark: #1e1108;
      --texto-label: #3a2a1a;
      --borde-input: #c8b89a;
      --dorado: #c8a05a;
    }
 
    body {
      background-color: var(--crema);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    /* ── HEADER ── */
    header {
      background-color: var(--rojo);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
 
    .header-icon {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }
 
    .header-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(15px, 4vw, 20px);
      color: #f5e6c8;
      letter-spacing: 0.5px;
    }
 
    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 32px 16px 48px;
    }
 
    .card {
      background: var(--crema);
      width: 100%;
      max-width: 480px;
    }
 
    .page-title {
      font-family: 'Lato', sans-serif;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 700;
      color: var(--texto-dark);
      margin-bottom: 24px;
    }
 
    /* ── IMAGE ── */
    .img-wrapper {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 32px;
      background: #d8cfc0;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
 
    .img-placeholder {
      color: #8a7a6a;
      font-size: 15px;
      text-align: center;
      padding: 20px;
    }
 
    /* ── FORM ── */
    .form-group {
      margin-bottom: 22px;
    }
 
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--texto-label);
      margin-bottom: 8px;
    }
 
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--borde-input);
      border-radius: 6px;
      font-size: 15px;
      font-family: 'Lato', sans-serif;
      color: var(--texto-dark);
      background: var(--crema-input);
      outline: none;
      transition: border-color 0.2s;
    }
 
    .form-group input:focus {
      border-color: var(--rojo);
    }
 
    .input-narrow { max-width: 120px; }
    .input-wide   { max-width: 100%; }
 
    /* ── BUTTON ── */
    .btn-modificar {
      display: block;
      width: 60%;
      max-width: 220px;
      margin: 8px auto 0;
      padding: 13px 0;
      background-color: var(--rojo);
      color: #f5e6c8;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
 
    .btn-modificar:hover  { background-color: var(--rojo-hover); }
    .btn-modificar:active { transform: scale(0.97); }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      header { padding: 10px 14px; }
      .header-icon { width: 36px; height: 36px; }
      main { padding: 20px 14px 40px; }
      .btn-modificar { width: 75%; }
    }
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>
    <svg class="header-icon" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="42" height="42" rx="6" fill="#6a1010"/>
      <path d="M9 10 Q9 8 11 8 L20 8 L20 34 L11 34 Q9 34 9 32 Z" fill="#f5e6c8" opacity="0.9"/>
      <path d="M22 8 L31 8 Q33 8 33 10 L33 32 Q33 34 31 34 L22 34 Z" fill="#f5e6c8" opacity="0.9"/>
      <path d="M20 8 L22 8 L22 34 L20 34 Z" fill="#c8a05a"/>
      <line x1="12" y1="13" x2="18" y2="13" stroke="#7a3a2a" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="12" y1="16" x2="18" y2="16" stroke="#7a3a2a" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="12" y1="19" x2="18" y2="19" stroke="#7a3a2a" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="24" y1="13" x2="30" y2="13" stroke="#7a3a2a" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="24" y1="16" x2="30" y2="16" stroke="#7a3a2a" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="24" y1="19" x2="30" y2="19" stroke="#7a3a2a" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="header-title">Dia del Libro 2026</span>
  </header>
 
  <!-- CONTENIDO PRINCIPAL -->
  <main>
    <div class="card">
      <h1 class="page-title">Modificar Datos de [Función]</h1>
 
      <!-- Imagen de la función -->
      <div class="img-wrapper">
        <p class="img-placeholder">📷 Imagen de la función<br><small>Reemplaza src con tu imagen</small></p>
        <!-- Para usar tu imagen, descomenta la línea de abajo y pon la URL: -->
        <!-- <img src="URL_DE_TU_IMAGEN" alt="Imagen de la función" /> -->
      </div>
 
      <!-- Formulario -->
 
      <div class="form-group">
        <label for="tiempo">Tiempo de espera de la función</label>
        <input type="number" id="tiempo" name="tiempo" value="0" class="input-wide" />
      </div>
 
      <button class="btn-modificar" onclick="modificar()">Modificar</button>
    </div>
  </main>
 
  <script>
    function modificar() {
      const estado = document.getElementById('estado').value;
      const tiempo = document.getElementById('tiempo').value;
      alert(`Datos guardados:\nEstado: ${estado}\nTiempo de espera: ${tiempo}`);
    }
  </script>
 
</body>
</html>
